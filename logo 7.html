<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title style="align-content: center;">Sign In</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/73d1035efa.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="script.js">
</head>
<body>

<div class="sign">
    <div class="signinform-box">
        <h1 style="text-align: center;">Sign In</h1>
        <form>
            <div class="input-group">

                <div class="input-field">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" placeholder="Enter Email">
                </div>

                <div class="input-field">
                    <i class="fa-solid fa-key"></i>
                    <input type="password" placeholder="Enter Password">
                </div>

                <p>Don't have an account? <a href="page2.html">Sign Up</a></p>

                <div class="btn-field">
                    <button type="button">Sign In</button>
                </div>

            </div>
        </form>
    </div>
</div>

</body>
</html>
